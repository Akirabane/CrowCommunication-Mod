<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lire une lettre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="compose.css">
<style>
  .letter-body { font-family: 'Caveat', cursive; font-size: 1.15rem; color: #e8dcc8; line-height: 1.7; white-space: pre-wrap; word-break: break-word; min-height: 6rem; }
  .read-field  { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,160,23,0.18); border-radius: 6px; padding: 0.6rem 0.85rem; margin-bottom: 0.5rem; }
  .reseal-note { font-size: 0.78rem; color: #9a8060; font-style: italic; margin-top: 0.25rem; }
</style>
</head>
<body>
<main class="letter">
  <header class="letter-head">
    <div class="seal" id="sealIcon">
      <svg viewBox="0 0 60 60" width="46" height="46">
        <circle cx="30" cy="30" r="28" fill="#1a0e08" stroke="#3a2418" stroke-width="2"/>
        <path d="M16 22 L30 36 L44 22 M30 36 L30 46" stroke="#d4a017" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="title-wrap">
      <div class="eyebrow">Service du corbeau</div>
      <h1>Lettre reçue</h1>
      <p class="sub" id="fromLine">De : —</p>
    </div>
    <button id="dismissBtn" type="button" class="dismiss">✕</button>
  </header>

  <div class="form">
    <div class="field recap">
      <span class="label">Objet</span>
      <div id="subjectView" class="read-field">—</div>
    </div>

    <div class="field">
      <span class="label">Message</span>
      <div id="bodyView" class="read-field letter-body">—</div>
    </div>

    <div class="forge-block">
      <label class="forge-toggle">
        <input id="forgeCheck" type="checkbox">
        <span class="forge-label">Changer le sceau</span>
        <span class="forge-hint">Imite la plume d'un autre pour modifier l'apparence de l'expéditeur.</span>
      </label>
      <div id="forgeField" class="field forge-target hidden">
        <span class="label">Nouveau pseudo à imiter</span>
        <input id="forgeName" type="text" maxlength="32" placeholder="Le nom à faire croire">
      </div>
      <div class="reseal-note">Le changement consomme le cooldown d'usurpation (30 min).</div>
    </div>

    <div id="error" class="error hidden"></div>

    <div class="actions">
      <button id="cancelBtn" type="button" class="btn ghost">Fermer</button>
      <button id="resealBtn" type="button" class="btn primary hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Changer le sceau
      </button>
    </div>
  </div>
</main>

<div id="qteOverlay" class="qte-overlay hidden">
  <div class="qte-card">
    <div class="qte-eyebrow">Épreuve de rescel</div>
    <h2 class="qte-title">Imite le sceau</h2>
    <p class="qte-sub">Frappe <strong>Espace</strong> quand le marqueur passe sur la zone d'or. <span id="qteRound">Manche 1 / 3</span></p>
    <div id="qteBar" class="qte-bar">
      <div id="qteZone" class="qte-zone"></div>
      <div id="qteMarker" class="qte-marker"></div>
    </div>
    <div id="qteFeedback" class="qte-feedback">Concentre-toi…</div>
    <div class="qte-actions">
      <button id="qteAbort" type="button" class="btn ghost">Renoncer</button>
      <button id="qteHit" type="button" class="btn primary">Frapper</button>
    </div>
  </div>
</div>

<script src="letter_view.js"></script>
</body>
</html>
